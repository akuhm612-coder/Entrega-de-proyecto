<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/Formulario.css">
</head>
<body>
    <form action="#" method="get">
        <h2 style="text-align: center; margin-bottom: 30px;">Formulario de Contacto</h2>
        
        <div> 
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required> 
        </div>
        
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required> 
        </div>
        
        <div>
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="123456789" required>
        </div>
        
        <div>
            <label for="comentario">Comentario:</label>
            <textarea id="comentario" name="comentario" rows="5" required></textarea>
        </div>
        
        <div>
            <label for="pais">País:</label>
            <select id="pais" name="pais" required>
                <option value="">-- Selecciona un país --</option>
                <option value="mexico">México</option>
                <option value="españa">España</option>
                <option value="argentina">Argentina</option>
                <option value="chile">Chile</option>
                <option value="colombia">Colombia</option>
                <option value="otro">Otro</option>
            </select>
        </div>
        
        <div>
            <p>¿Cómo te enteraste de nosotros?</p>
            <label>
                <input type="checkbox" name="medio" value="redes"> Redes Sociales
            </label>
            <label>
                <input type="checkbox" name="medio" value="amigo"> Recomendación de Amigo
            </label>
            <label>
                <input type="checkbox" name="medio" value="buscador"> Buscador
            </label>
            <label>
                <input type="checkbox" name="medio" value="publicidad"> Publicidad
            </label>
        </div>
        
        <div>
            <p>Género:</p>
            <label>
                <input type="radio" name="genero" value="masculino"> Masculino
            </label>
            <label>
                <input type="radio" name="genero" value="femenino"> Femenino
            </label>
            <label>
                <input type="radio" name="genero" value="otro"> Otro
            </label>
            <label>
                <input type="radio" name="genero" value="prefiero"> Prefiero no decirlo
            </label>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button type="submit" style="background-color: #00bfff; color: black; padding: 12px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px;">Enviar</button>
            <button type="reset" style="background-color: #ff6b6b; color: white; padding: 12px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">Limpiar</button>
        </div>
    </form>
</body>
</html>
